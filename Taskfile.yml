version: "3"

# ---------------------------------------------------------------------------
# Rust workspace task automation for pastel-market.
# Combines pastel-picker (screening) + reins-market (monitoring).
# ---------------------------------------------------------------------------

tasks:
  # --- Quality Gates ---
  check:all:
    desc: "Run all quality gates (format, lint, test)"
    deps: [format, lint, test:unit]
    cmds:
      - echo "All checks passed!"

  format:
    desc: "Auto-format all workspace crates"
    cmds:
      - cargo fmt --all -- --check

  fmt:
    desc: "Format all Rust code (write mode)"
    cmds:
      - cargo fmt --all

  lint:
    desc: "Run clippy on all targets"
    cmds:
      - cargo clippy --all-targets -- -D warnings

  test:unit:
    desc: "Run all workspace tests"
    cmds:
      - cargo test --workspace

  test:verbose:
    desc: "Run tests with output visible (--nocapture)"
    cmds:
      - cargo test --workspace -- --nocapture

  # --- Build ---
  build:
    desc: "Build all workspace crates (debug)"
    cmds:
      - cargo build --workspace

  build:release:
    desc: "Build optimized release binary"
    deps: [check:all]
    cmds:
      - cargo build --release

  # --- Run ---
  run:
    desc: "Run pastel-market TUI"
    cmds:
      - cargo run

  # --- Install ---
  install:
    desc: "Build release binary and install to ~/.cargo/bin"
    cmds:
      - cargo install --path . --locked

  # --- Code Quality ---
  loc:
    desc: "Show lines of code statistics using tokei"
    cmds:
      - tokei

  clean:
    desc: "Remove build artifacts"
    cmds:
      - cargo clean

  # --- Version Management (scripts/version.sh is the source of truth) ---
  version:show:
    desc: "Print the current version"
    cmds:
      - ./scripts/version.sh show

  version:patch:
    desc: "Bump patch version and sync all Cargo.toml"
    cmds:
      - ./scripts/version.sh patch

  version:minor:
    desc: "Bump minor version and sync all Cargo.toml"
    cmds:
      - ./scripts/version.sh minor

  version:major:
    desc: "Bump major version and sync all Cargo.toml"
    cmds:
      - ./scripts/version.sh major

  version:sync:
    desc: "Re-sync all Cargo.toml to VERSION file"
    cmds:
      - ./scripts/version.sh sync

  version:tag:
    desc: "Create a git tag from the current VERSION file"
    cmds:
      - ./scripts/version.sh tag

  # --- Release ---
  release:
    desc: "Bump patch, commit, tag, and push"
    cmds:
      - ./scripts/version.sh release
